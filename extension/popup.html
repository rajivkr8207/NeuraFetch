<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0f0f12 0%, #1a1a1f 100%);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #2a2a2f;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #7216f4;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #8b5cf6;
    }

    .container {
      padding: 20px;
    }

    /* Header Section */
    .header {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #7216f4, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(114, 22, 244, 0.3);
    }

    .header h2 {
      background: linear-gradient(135deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .mode-badge {
      background: rgba(114, 22, 244, 0.2);
      backdrop-filter: blur(10px);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #a78bfa;
      border: 1px solid rgba(114, 22, 244, 0.3);
    }

    /* User Profile Section */
    .user-profile {
      background: linear-gradient(135deg, rgba(30, 30, 35, 0.8), rgba(20, 20, 25, 0.9));
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(114, 22, 244, 0.2);
      transition: all 0.3s ease;
    }

    .user-profile:hover {
      border-color: rgba(114, 22, 244, 0.5);
      transform: translateY(-1px);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7216f4, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: white;
      box-shadow: 0 4px 12px rgba(114, 22, 244, 0.4);
    }

    .user-details {
      flex: 1;
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
      color: white;
      margin-bottom: 2px;
    }

    .user-email {
      font-size: 11px;
      color: #9ca3af;
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.2);
      border: none;
      color: #f87171;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      transform: scale(1.05);
    }

    .preview-card {
      background: linear-gradient(135deg, rgba(40, 40, 45, 0.8), rgba(30, 30, 35, 0.9));
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(114, 22, 244, 0.2);
      transition: all 0.3s ease;
    }

    .preview-card:hover {
      border-color: rgba(114, 22, 244, 0.5);
      transform: translateY(-1px);
    }

    .preview-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: white;
      line-height: 1.4;
    }

    .preview-url {
      font-size: 11px;
      color: #9ca3af;
      word-break: break-all;
      font-family: monospace;
    }

    /* Form Groups */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #d1d5db;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      background: rgba(50, 50, 55, 0.8);
      border: 1px solid rgba(114, 22, 244, 0.3);
      border-radius: 12px;
      font-size: 12px;
      color: white;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #7216f4;
      background: rgba(60, 60, 65, 0.9);
      box-shadow: 0 0 0 3px rgba(114, 22, 244, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    .form-group select option {
      background: #1f1f24;
      color: white;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #7216f4, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(114, 22, 244, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      background: #4b5563;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .success-message,
    .error-message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 12px;
      font-size: 12px;
      text-align: center;
      display: none;
      animation: slideUp 0.3s ease;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.5);
      color: #10b981;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #f87171;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(114, 22, 244, 0.5), transparent);
      margin: 16px 0;
    }

    .auth-required {
      text-align: center;
      padding: 32px 20px;
    }

    .auth-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .auth-title {
      color: white;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .auth-text {
      color: #9ca3af;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .auth-btn {
      background: linear-gradient(135deg, #7216f4, #8b5cf6);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(114, 22, 244, 0.4);
    }

    /* Hide element */
    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="logo-section">
        <div class="logo-icon">🧠</div>
        <h2>NeuraFetch</h2>
      </div>
      <span class="mode-badge" id="modeBadge">📄 Page Mode</span>
    </div>

    <div id="userProfileSection" class="user-profile hidden">
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">R</div>
        <div class="user-details">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-email" id="userEmail">user@example.com</div>
        </div>
      </div>
    </div>

    <div id="authRequiredSection" class="auth-required hidden">
      <div class="auth-icon">🔐</div>
      <div class="auth-title">Login Required</div>
      <div class="auth-text">Please login to save your knowledge</div>
      <button id="loginBtn" class="auth-btn">Login / Sign Up</button>
    </div>
    <div id="loadingScreen" class="auth-required">
      <div class="auth-icon">⏳</div>
      <div class="auth-title">Checking...</div>
      <div class="auth-text">Please wait</div>
    </div>
    <div id="mainContent" class="hidden">
      <div class="preview-card">
        <div class="preview-title" id="pageTitle">Loading...</div>
        <div class="preview-url" id="pageUrl">Fetching page info...</div>
      </div>

      <div class="form-group">
        <label>📝 Notes</label>
        <textarea id="notes" placeholder="Add your thoughts..."></textarea>
      </div>

      <div class="form-group">
        <label>📁 Collection</label>
        <select id="collection">
          <option value="inbox">📥 Inbox</option>
          <option value="reading">📖 Reading List</option>
          <option value="research">🔬 Research</option>
          <option value="ideas">💡 Ideas</option>
        </select>
      </div>

      <button class="btn" id="saveBtn">
        <span id="saveBtnText">💾 Save Page</span>
      </button>

      <div class="success-message" id="successMessage">✓ Saved successfully!</div>
      <div class="error-message" id="errorMessage">✗ Error saving. Please try again.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
